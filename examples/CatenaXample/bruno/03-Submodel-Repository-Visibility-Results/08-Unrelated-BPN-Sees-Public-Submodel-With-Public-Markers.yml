info:
  name: "Unrelated BPN Sees Public Submodel With Public Markers"
  type: http
  seq: 8

http:
  method: GET
  url: "http://localhost:5005/submodels"
  headers:
    - name: "Edc-Bpn"
      value: "BPN_COMPANY_999"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test('unrelated BPN sees public marker rows but no restricted submodel', function () {
            expect(res.status).to.equal(200);
            const submodels = res.body.result;
            expect(submodels).to.have.length(1);
            expect(submodels[0].idShort).to.eql('PublicNameplate');
            expect(submodels[0].supplementalSemanticIds[0].keys.map((key) => key.value)).to.eql(['PUBLIC_READABLE']);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
