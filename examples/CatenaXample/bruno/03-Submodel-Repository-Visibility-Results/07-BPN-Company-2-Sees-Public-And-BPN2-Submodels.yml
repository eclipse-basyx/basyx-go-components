info:
  name: "BPN Company 2 Sees Public And BPN2 Submodels"
  type: http
  seq: 7

http:
  method: GET
  url: "http://localhost:5005/submodels"
  headers:
    - name: "Edc-Bpn"
      value: "BPN_COMPANY_002"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test('BPN2 result keeps only BPN2 restricted markers', function () {
            expect(res.status).to.equal(200);
            const restricted = res.body.result.find((item) => item.idShort === 'RestrictedSerialPartTypization');
            expect(restricted.supplementalSemanticIds[0].keys.map((key) => key.value)).to.eql(['BPN_COMPANY_002']);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
