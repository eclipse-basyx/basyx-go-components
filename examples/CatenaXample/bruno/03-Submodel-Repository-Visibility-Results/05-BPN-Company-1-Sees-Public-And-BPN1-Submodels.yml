info:
  name: "BPN Company 1 Sees Public And BPN1 Submodels"
  type: http
  seq: 5

http:
  method: GET
  url: "http://localhost:5005/submodels"
  headers:
    - name: "Edc-Bpn"
      value: "BPN_COMPANY_001"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test('BPN1 result keeps only BPN1 restricted markers', function () {
            expect(res.status).to.equal(200);
            const submodels = res.body.result;
            expect(submodels).to.have.length(2);
            const restricted = submodels.find((item) => item.idShort === 'RestrictedSerialPartTypization');
            expect(restricted.supplementalSemanticIds[0].keys.map((key) => key.value)).to.eql(['BPN_COMPANY_001']);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
