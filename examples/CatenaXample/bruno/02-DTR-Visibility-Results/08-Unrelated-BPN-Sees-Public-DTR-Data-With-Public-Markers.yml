info:
  name: "Unrelated BPN Sees Public DTR Data With Public Markers"
  type: http
  seq: 8

http:
  method: GET
  url: "http://localhost:5004/api/v3/shell-descriptors"
  headers:
    - name: "Edc-Bpn"
      value: "BPN_COMPANY_999"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test('unrelated BPN sees public markers but no partner data', function () {
            expect(res.status).to.equal(200);
            const shell = res.body.result[0];
            expect(shell.specificAssetIds).to.have.length(1);
            expect(shell.specificAssetIds[0].name).to.eql('manufacturerPartId');
            expect(shell.specificAssetIds[0].externalSubjectId.keys.map((key) => key.value)).to.eql(['PUBLIC_READABLE']);
            expect(shell.submodelDescriptors).to.have.length(1);
            expect(shell.submodelDescriptors[0].supplementalSemanticId[0].keys.map((key) => key.value)).to.eql(['PUBLIC_READABLE']);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
