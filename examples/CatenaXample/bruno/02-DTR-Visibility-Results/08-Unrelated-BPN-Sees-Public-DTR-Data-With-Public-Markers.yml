info:
  name: "Unrelated BPN Sees Public DTR Data With Public Markers"
  type: http
  seq: 8

http:
  method: GET
  url: "http://localhost:5004/api/v3/shell-descriptors"
  headers:
    - name: "Edc-Bpn"
      value: "BPN_COMPANY_999"
  auth:
    type: none

runtime:
  scripts:
    - type: before-request
      code: |-
        const tokenVariable = "userAccessToken";
        const expiresAtVariable = "userAccessTokenExpiresAt";
        const nowSeconds = Math.floor(Date.now() / 1000);
        
        function tokenIsFresh() {
          const expiresAt = Number(bru.getVar(expiresAtVariable) || 0);
          return expiresAt - 30 > nowSeconds;
        }
        
        function formUrlEncode(fields) {
          return Object.entries(fields)
            .map(([key, value]) => `${encodeURIComponent(key)}=${encodeURIComponent(value)}`)
            .join("&");
        }
        
        async function requestOAuth2Token() {
          if (tokenIsFresh()) {
            return bru.getVar(tokenVariable);
          }
        
          const response = await bru.sendRequest({
            url: "http://keycloak.localhost:8080/realms/basyx/protocol/openid-connect/token",
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded",
            },
            data: formUrlEncode({
              grant_type: "password",
              client_id: "basyx-ui",
              username: "collection_viewer",
              password: "pwd",
            }),
          });
        
          const status = response.status || response.statusCode || response.code;
          if (status !== 200) {
            throw new Error(`OAuth2 token request failed with status ${status}`);
          }
        
          const tokenResponse = typeof response.data === "string" ? JSON.parse(response.data) : response.data;
          bru.setVar(tokenVariable, tokenResponse.access_token);
          bru.setVar(expiresAtVariable, String(nowSeconds + Number(tokenResponse.expires_in || 300)));
        
          return tokenResponse.access_token;
        }
        
        const token = await requestOAuth2Token();
        req.setHeader("Authorization", `Bearer ${token}`);
    - type: tests
      code: |-
        test('unrelated BPN sees public markers but no partner data', function () {
            expect(res.status).to.equal(200);
            const shell = res.body.result[0];
            expect(shell.specificAssetIds).to.have.length(1);
            expect(shell.specificAssetIds[0].name).to.eql('manufacturerPartId');
            expect(shell.specificAssetIds[0].externalSubjectId.keys.map((key) => key.value)).to.eql(['PUBLIC_READABLE']);
            expect(shell.submodelDescriptors).to.have.length(1);
            expect(shell.submodelDescriptors[0].supplementalSemanticId[0].keys.map((key) => key.value)).to.eql(['PUBLIC_READABLE']);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
