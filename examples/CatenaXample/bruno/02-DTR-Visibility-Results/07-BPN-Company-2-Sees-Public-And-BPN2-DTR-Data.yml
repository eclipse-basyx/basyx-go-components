info:
  name: "BPN Company 2 Sees Public And BPN2 DTR Data"
  type: http
  seq: 7

http:
  method: GET
  url: "http://localhost:5004/api/v3/shell-descriptors"
  headers:
    - name: "Edc-Bpn"
      value: "BPN_COMPANY_002"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test('BPN2 result keeps BPN2 markers and removes BPN1 markers', function () {
            expect(res.status).to.equal(200);
            const shell = res.body.result[0];
            const customerKeys = shell.specificAssetIds.find((item) => item.name === 'customerPartId').externalSubjectId.keys.map((key) => key.value);
            expect(customerKeys).to.eql(['BPN_COMPANY_002']);
            const restrictedKeys = shell.submodelDescriptors.find((item) => item.idShort === 'RestrictedSerialPartTypization').supplementalSemanticId[0].keys.map((key) => key.value);
            expect(restrictedKeys).to.eql(['BPN_COMPANY_002']);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
