info:
  name: "Anonymous Sees Public DTR Descriptor Only"
  type: http
  seq: 3

http:
  method: GET
  url: "http://localhost:5004/api/v3/shell-descriptors"
  auth:
    type: none

runtime:
  scripts:
    - type: tests
      code: |-
        test('anonymous result hides asset IDs and marker references', function () {
            expect(res.status).to.equal(200);
            const shell = res.body.result[0];
            expect(shell.id).to.eql('urn:example:aas:product-001');
            expect(shell).to.not.have.property('specificAssetIds');
            expect(shell.submodelDescriptors).to.have.length(1);
            expect(shell.submodelDescriptors[0].idShort).to.eql('PublicNameplate');
            expect(shell.submodelDescriptors[0]).to.not.have.property('supplementalSemanticId');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
