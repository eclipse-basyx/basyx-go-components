              test('admin sees all descriptors, asset IDs, and markers', function () {
                  expect(res.status).to.equal(200);
                  const shell = res.body.result[0];
                  expect(shell.idShort).to.eql('ProductTwin');
                  expect(shell.specificAssetIds).to.have.length(2);
