info:
  name: "CatenaXample"
  type: collection
  version: "1"
items:
  - info:
      name: "Setup - Write Example Data"
      type: folder
      seq: 1
    items:
      - info:
          name: "Write Shell Descriptor As Admin"
          type: http
          seq: 1
        http:
          method: POST
          url: "http://localhost:5004/api/v3/shell-descriptors"
          headers:
            - name: "Content-Type"
              value: "application/json"
          body:
            type: json
            data: |-
              {
                "idShort": "ProductTwin",
                "id": "urn:example:aas:product-001",
                "description": [
                  {
                    "language": "en",
                    "text": "Public and partner-restricted submodel descriptors."
                  }
                ],
                "globalAssetId": "urn:example:asset:product-001",
                "specificAssetIds": [
                  {
                    "name": "manufacturerPartId",
                    "value": "PART-001",
                    "externalSubjectId": {
                      "type": "ExternalReference",
                      "keys": [
                        {
                          "type": "GlobalReference",
                          "value": "PUBLIC_READABLE"
                        }
                      ]
                    }
                  },
                  {
                    "name": "customerPartId",
                    "value": "CUSTOMER-PART-001",
                    "externalSubjectId": {
                      "type": "ExternalReference",
                      "keys": [
                        {
                          "type": "GlobalReference",
                          "value": "BPN_COMPANY_001"
                        },
                        {
                          "type": "GlobalReference",
                          "value": "BPN_COMPANY_002"
                        }
                      ]
                    }
                  }
                ],
                "submodelDescriptors": [
                  {
                    "idShort": "PublicNameplate",
                    "id": "urn:example:submodel:nameplate",
                    "supplementalSemanticIds": [
                      {
                        "type": "ExternalReference",
                        "keys": [
                          {
                            "type": "GlobalReference",
                            "value": "PUBLIC_READABLE"
                          }
                        ]
                      }
                    ],
                    "endpoints": [
                      {
                        "interface": "SUBMODEL-3.0",
                        "protocolInformation": {
                          "href": "http://localhost:5005/submodels/dXJuOmV4YW1wbGU6c3VibW9kZWw6bmFtZXBsYXRl",
                          "endpointProtocol": "HTTP"
                        }
                      }
                    ]
                  },
                  {
                    "idShort": "RestrictedSerialPartTypization",
                    "id": "urn:example:submodel:serial-part-typization",
                    "supplementalSemanticIds": [
                      {
                        "type": "ExternalReference",
                        "keys": [
                          {
                            "type": "GlobalReference",
                            "value": "BPN_COMPANY_001"
                          },
                          {
                            "type": "GlobalReference",
                            "value": "BPN_COMPANY_002"
                          }
                        ]
                      }
                    ],
                    "endpoints": [
                      {
                        "interface": "SUBMODEL-3.0",
                        "protocolInformation": {
                          "href": "http://localhost:5005/submodels/dXJuOmV4YW1wbGU6c3VibW9kZWw6c2VyaWFsLXBhcnQtdHlwaXphdGlvbg",
                          "endpointProtocol": "HTTP"
                        }
                      }
                    ]
                  }
                ]
              }
          auth:
            type: none
        runtime:
          scripts:
          - type: before-request
            code: |-
              const tokenVariable = "adminAccessToken";
              const expiresAtVariable = "adminAccessTokenExpiresAt";
              const nowSeconds = Math.floor(Date.now() / 1000);
              
              function tokenIsFresh() {
                const expiresAt = Number(bru.getVar(expiresAtVariable) || 0);
                return expiresAt - 30 > nowSeconds;
              }
              
              function formUrlEncode(fields) {
                return Object.entries(fields)
                  .map(([key, value]) => `${encodeURIComponent(key)}=${encodeURIComponent(value)}`)
                  .join("&");
              }
              
              async function requestOAuth2Token() {
                if (tokenIsFresh()) {
                  return bru.getVar(tokenVariable);
                }
              
                const response = await bru.sendRequest({
                  url: "http://keycloak.localhost:8080/realms/basyx/protocol/openid-connect/token",
                  method: "POST",
                  headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                  },
                  data: formUrlEncode({
                    grant_type: "password",
                    client_id: "basyx-ui",
                    username: "admin",
                    password: "pwd",
                  }),
                });
              
                const status = response.status || response.statusCode || response.code;
                if (status !== 200) {
                  throw new Error(`OAuth2 token request failed with status ${status}`);
                }
              
                const tokenResponse = typeof response.data === "string" ? JSON.parse(response.data) : response.data;
                bru.setVar(tokenVariable, tokenResponse.access_token);
                bru.setVar(expiresAtVariable, String(nowSeconds + Number(tokenResponse.expires_in || 300)));
              
                return tokenResponse.access_token;
              }
              
              const token = await requestOAuth2Token();
              req.setHeader("Authorization", `Bearer ${token}`);
          - type: tests
            code: |-
              test('shell descriptor is created or already present', function () {
                  expect([201, 409]).to.include(res.status);
              });
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
