services:
  aas-environment:
    container_name: aas-environment-history-guarded
    image: eclipsebasyx/aasenvironment-go:SNAPSHOT
    pull_policy: always
    command: ["/app/aasenvironmentservice"]
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - CORS_ALLOWEDORIGINS=*
      - CORS_ALLOWEDHEADERS=*
      - CORS_ALLOWEDCREDENTIALS=true
      - CORS_ALLOWEDMETHODS=GET,POST,PUT,PATCH,DELETE,OPTIONS
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=100
      - POSTGRES_MAXIDLECONNECTIONS=50
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
      - BASYX_HISTORY_MODE=audit
      - BASYX_HISTORY_RETENTION_DAYS=0
      - BASYX_HISTORY_FULL_SNAPSHOT_INTERVAL=5
      - BASYX_HISTORY_IMMUTABILITY=postgres_guarded
      - BASYX_AUDIT_IDENTITY_MODE=extended
      - BASYX_HISTORY_EVIDENCE_ENABLED=true
      - BASYX_HISTORY_EVIDENCE_PROVIDER=s3
      - BASYX_HISTORY_EVIDENCE_BUCKET=basyx-history-evidence
      - BASYX_HISTORY_EVIDENCE_PREFIX=history-evidence
      - BASYX_HISTORY_EVIDENCE_REGION=us-east-1
      - BASYX_HISTORY_EVIDENCE_ENDPOINT=http://minio:9000
      - BASYX_HISTORY_EVIDENCE_ACCESS_KEY_ID=minioadmin
      - BASYX_HISTORY_EVIDENCE_SECRET_ACCESS_KEY=minioadmin
      - BASYX_HISTORY_EVIDENCE_PATH_STYLE=true
      - BASYX_HISTORY_EVIDENCE_RETENTION_MODE=compliance
      - BASYX_HISTORY_EVIDENCE_RETENTION_DAYS=7
      - BASYX_HISTORY_EVIDENCE_WRITE_TIMEOUT_SECONDS=10
      - BASYX_HISTORY_INTEGRITY_ANCHOR_PROVIDER=none
      - ABAC_ENABLED=true
      - ABAC_MODELPATH=/security_env/access-rules.json
      - ABAC_POLICY_FILE_IMPORT=if_missing
      - ABAC_MANAGEMENT_API_ENABLED=true
      - OIDC_TRUSTLISTPATH=/security_env/trustlist.json
      - GENERAL_AASREGISTRYINTEGRATION=true
      - GENERAL_SUBMODELREGISTRYINTEGRATION=true
      - GENERAL_DISCOVERYINTEGRATION=true
      - GENERAL_EXTERNALURL=http://localhost:8082
      - GENERAL_AAS_PRECONFIG_PATHS=/app/preconfiguration
    volumes:
      - ./aas:/app/preconfiguration:ro
      - ./security_env:/security_env:ro
    depends_on:
      basyx_configuration:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      keycloak-healthcheck:
        condition: service_completed_successfully
    extra_hosts:
      - "keycloak.localhost:host-gateway"
    restart: unless-stopped

  aas-ui:
    container_name: aas-web-ui-history-guarded
    image: eclipsebasyx/aas-gui:SNAPSHOT
    pull_policy: always
    ports:
      - "3000:3000"
    volumes:
      - ./basyx-infra.yml:/basyx-infra.yml:ro
    environment:
      - ENDPOINT_CONFIG_AVAILABLE=false
    extra_hosts:
      - "keycloak.localhost:host-gateway"
    depends_on:
      aas-environment:
        condition: service_started
    restart: unless-stopped

  db:
    container_name: postgres_db_history_guarded
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: basyxTestDB
    command: ["postgres", "-c", "listen_addresses=*"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d basyxTestDB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  basyx_configuration:
    container_name: basyx_configuration_history_guarded
    image: eclipsebasyx/basyxconfigurationservice-go:SNAPSHOT
    pull_policy: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=100
      - POSTGRES_MAXIDLECONNECTIONS=50
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
    depends_on:
      db:
        condition: service_healthy

  keycloak:
    container_name: keycloak_history_audit
    image: keycloak/keycloak:26.0.6
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/basyxTestDB
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: admin123
      KC_HOSTNAME: keycloak.localhost
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HTTPS_ENABLED: "false"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_IMPORT: /opt/keycloak/data/import/
      KC_HTTP_MANAGEMENT_ENABLED: "true"
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
          /opt/keycloak/bin/kc.sh start-dev --import-realm --health-enabled=true &
          kc_pid=$$!
          trap 'kill "$$kc_pid" 2>/dev/null || true; wait "$$kc_pid" 2>/dev/null || true' TERM INT
          echo 'Waiting for Keycloak admin CLI...'
          until /opt/keycloak/bin/kcadm.sh config credentials --server http://localhost:8080 --realm master --user "$${KEYCLOAK_ADMIN}" --password "$${KEYCLOAK_ADMIN_PASSWORD}"; do
            if ! kill -0 "$$kc_pid" 2>/dev/null; then
              echo 'Keycloak stopped before the admin CLI became ready.' >&2
              wait "$$kc_pid" 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done
          if ! /opt/keycloak/bin/kcadm.sh update realms/master -s sslRequired=none; then
            echo 'Failed to relax Keycloak master realm for local demo.' >&2
            kill "$$kc_pid" 2>/dev/null || true
            wait "$$kc_pid" 2>/dev/null || true
            exit 1
          fi
          echo 'Keycloak master realm sslRequired=none for local demo.'
          wait "$$kc_pid"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  keycloak-healthcheck:
    container_name: keycloak_history_audit_healthcheck
    image: curlimages/curl:latest
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
          echo 'Waiting for Keycloak to become ready...'
          until curl -sf http://keycloak:9000/health/ready; do
            sleep 5
          done
          echo 'Waiting for Keycloak master realm HTTP mode...'
          until token_response="$$(curl -sf -X POST 'http://keycloak:8080/realms/master/protocol/openid-connect/token' \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            -d 'client_id=admin-cli' \
            -d 'grant_type=password' \
            -d "username=$${KEYCLOAK_ADMIN}" \
            -d "password=$${KEYCLOAK_ADMIN_PASSWORD}")" \
            && token="$$(echo "$$token_response" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')" \
            && [ -n "$$token" ] \
            && realm_response="$$(curl -sf -H "Authorization: Bearer $$token" 'http://keycloak:8080/admin/realms/master')" \
            && echo "$$realm_response" | grep -q '"sslRequired":"none"'; do
            sleep 2
          done
          echo 'Keycloak is ready!'
    depends_on:
      - keycloak

  minio:
    container_name: minio_history_evidence
    image: quay.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  minio-init:
    container_name: minio_history_evidence_init
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done
        mc mb --ignore-existing --with-lock local/basyx-history-evidence
        mc version enable local/basyx-history-evidence
        mc retention set --default compliance 7d local/basyx-history-evidence
