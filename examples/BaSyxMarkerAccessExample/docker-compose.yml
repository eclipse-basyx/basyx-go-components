services:
  dtr-db:
    image: postgres:18
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: dtr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dtr"]
      interval: 5s
      timeout: 5s
      retries: 20

  smrepo-db:
    image: postgres:18
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: smrepo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d smrepo"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak-db:
    image: postgres:18
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20

  dtr-configuration:
    build:
      context: ../..
      dockerfile: ./cmd/basyxconfigurationservice/Dockerfile
    environment:
      POSTGRES_HOST: dtr-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DBNAME: dtr
    depends_on:
      dtr-db:
        condition: service_healthy

  smrepo-configuration:
    build:
      context: ../..
      dockerfile: ./cmd/basyxconfigurationservice/Dockerfile
    environment:
      POSTGRES_HOST: smrepo-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DBNAME: smrepo
    depends_on:
      smrepo-db:
        condition: service_healthy

  digital-twin-registry:
    build:
      context: ../..
      dockerfile: ./cmd/digitaltwinregistryservice/Dockerfile
    environment:
      SERVER_PORT: 5004
      SERVER_CONTEXTPATH: /api/v3
      SERVER_STRICTVERIFICATION: "off"
      POSTGRES_HOST: dtr-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DBNAME: dtr
      ABAC_ENABLED: "true"
      ABAC_MODELPATH: /security/access-rules.json
      OIDC_TRUSTLISTPATH: /security/trustlist.json
      GENERAL_ENABLECUSTOMMIDDLEWAREHEADERINJECTION: "true"
      GENERAL_SUPPORTSSINGULARSUPPLEMENTALSEMANTICID: "true"
    volumes:
      - ./security/dtr:/security:ro
    extra_hosts:
      - "localhost:host-gateway"
    ports:
      - "5004:5004"
    depends_on:
      dtr-configuration:
        condition: service_completed_successfully
      keycloak-healthcheck:
        condition: service_completed_successfully

  submodel-repository:
    build:
      context: ../..
      dockerfile: ./cmd/submodelrepositoryservice/Dockerfile
    environment:
      SERVER_PORT: 5004
      SERVER_STRICTVERIFICATION: "off"
      POSTGRES_HOST: smrepo-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DBNAME: smrepo
      ABAC_ENABLED: "true"
      ABAC_MODELPATH: /security/access-rules.json
      OIDC_TRUSTLISTPATH: /security/trustlist.json
      GENERAL_ENABLECUSTOMMIDDLEWAREHEADERINJECTION: "true"
    volumes:
      - ./security/smrepo:/security:ro
    extra_hosts:
      - "localhost:host-gateway"
    ports:
      - "5005:5004"
    depends_on:
      smrepo-configuration:
        condition: service_completed_successfully
      keycloak-healthcheck:
        condition: service_completed_successfully

  keycloak:
    image: keycloak/keycloak:26.0.6
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: admin123
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8080"
      KC_HOSTNAME_URL: http://localhost:8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_IMPORT: /opt/keycloak/data/import/
      KC_HTTP_MANAGEMENT_ENABLED: "true"
    command: ["start-dev", "--import-realm", "--health-enabled=true"]
    ports:
      - "8080:8080"
    volumes:
      - ../BaSyxDigitalTwinRegistryExample/keycloak/realm:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy

  keycloak-healthcheck:
    image: curlimages/curl:8.15.0
    command:
      - sh
      - -c
      - until curl -sf http://keycloak:9000/health/ready; do sleep 5; done
    depends_on:
      keycloak:
        condition: service_started
