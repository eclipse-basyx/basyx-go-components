services:
  dpp-api:
    container_name: dpp-api-secured
    image: eclipsebasyx/dppapi-go:1.0.0-rc.6
    pull_policy: always
    environment:
      - SERVER_PORT=8080
      - CORS_ALLOWEDORIGINS=*
      - CORS_ALLOWEDHEADERS=*
      - CORS_ALLOWEDCREDENTIALS=true
      - CORS_ALLOWEDMETHODS=GET,POST,PUT,PATCH,DELETE,OPTIONS
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxDppSecuredExample
      - POSTGRES_MAXOPENCONNECTIONS=50
      - POSTGRES_MAXIDLECONNECTIONS=50
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
      - ABAC_ENABLED=true
      - ABAC_MODELPATH=/security_env/access-rules.json
      - OIDC_TRUSTLISTPATH=/security_env/trustlist.json
      - BASYX_HISTORY_MODE=audit
      - BASYX_HISTORY_RETENTION_DAYS=0
      - BASYX_HISTORY_FULL_SNAPSHOT_INTERVAL=1
      - BASYX_HISTORY_IMMUTABILITY=none
      - BASYX_AUDIT_IDENTITY_MODE=extended
      - BASYX_HISTORY_EVIDENCE_ENABLED=false
      - BASYX_HISTORY_EVIDENCE_PROVIDER=none
      - BASYX_HISTORY_INTEGRITY_ANCHOR_PROVIDER=none
    ports:
      - "8088:8080"
    volumes:
      - ./security_env:/security_env:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--output-document=-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      basyx_configuration:
        condition: service_completed_successfully
      keycloak-healthcheck:
        condition: service_completed_successfully
    extra_hosts:
      - "keycloak.localhost:host-gateway"
    restart: unless-stopped

  keycloak:
    container_name: dpp-keycloak-secured
    image: keycloak/keycloak:26.0.6
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/basyxDppSecuredExample
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: admin123
      KC_HOSTNAME: keycloak.localhost
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HTTPS_ENABLED: "false"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_IMPORT: /opt/keycloak/data/import/
      KC_HTTP_MANAGEMENT_ENABLED: "true"
    command: ["start-dev", "--import-realm", "--health-enabled=true"]
    ports:
      - "8080:8080"
    volumes:
      - ../BaSyxSecuredExample/keycloak/realm:/opt/keycloak/data/import:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  keycloak-healthcheck:
    container_name: dpp-keycloak-secured-healthcheck
    image: curlimages/curl:latest
    command: >
      sh -c "
        echo 'Waiting for Keycloak to become ready...';
        until curl -sf http://keycloak:9000/health/ready; do
          sleep 5;
        done;
        echo 'Keycloak is ready!'"
    depends_on:
      - keycloak

  basyx_configuration:
    container_name: dpp-basyx-configuration-secured
    image: eclipsebasyx/basyxconfigurationservice-go:1.0.0-rc.6
    pull_policy: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxDppSecuredExample
      - POSTGRES_MAXOPENCONNECTIONS=50
      - POSTGRES_MAXIDLECONNECTIONS=50
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: dpp-postgres-db-secured
    image: postgres:18
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: basyxDppSecuredExample
    command: ["postgres", "-c", "listen_addresses=*"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d basyxDppSecuredExample"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
