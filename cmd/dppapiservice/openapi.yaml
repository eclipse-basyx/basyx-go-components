openapi: 3.0.3
info:
  description: |
    Digital Product Passport API aligned with the IDTA-01001 v3.2 DPP metamodel annex and the IDTA-01002 v3.2 DPP API mapping annex.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: Digital Product Passport API
  version: 1.0.0
servers:
- url: https://api.example.com
security:
- bearerAuth: []
tags:
- description: DPP life-cycle operations.
  name: DPP Life Cycle
- description: Element-level DPP operations.
  name: DPP Fine Granular
paths:
  /v1/dpps/{dppId}:
    delete:
      description: |
        Deletes the DPP resource when deletion is legally permitted. Implementations must enforce archiving and deletion restrictions required by applicable regulation.
      operationId: deleteDPPById
      parameters:
      - description: Percent-encoded Digital Product Passport identifier.
        explode: false
        in: path
        name: dppId
        required: true
        schema:
          minLength: 1
          type: string
        style: simple
      responses:
        "204":
          description: DPP deleted
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Invalid request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Authentication is required.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The authenticated subject is not allowed to perform the operation.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Resource not found.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The request conflicts with the current resource state or regulatory
            restrictions.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Internal server error.
      summary: Delete DPP by DPP ID
      tags:
      - DPP Life Cycle
    get:
      description: |
        Retrieves a DigitalProductPassport document. Compressed responses use content section properties; full responses use the expanded read-only elements array.
      operationId: readDPPById
      parameters:
      - description: Percent-encoded Digital Product Passport identifier.
        explode: false
        in: path
        name: dppId
        required: true
        schema:
          minLength: 1
          type: string
        style: simple
      - description: |
          DPP serialization representation. Compressed is mandatory and the default. Full is optional and corresponds to the expanded representation.
        explode: true
        in: query
        name: representation
        required: false
        schema:
          $ref: "#/components/schemas/Representation"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalProductPassport"
          description: DPP document
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Invalid request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Authentication is required.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The authenticated subject is not allowed to perform the operation.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Resource not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Internal server error.
      summary: Read DPP by DPP ID
      tags:
      - DPP Life Cycle
    patch:
      description: |
        Applies a compressed partial DPP document using JSON Merge Patch (RFC 7396), updates lastUpdate, and archives the change according to EN 18221. Full representation writes are not supported.
      operationId: updateDPPById
      parameters:
      - description: Percent-encoded Digital Product Passport identifier.
        explode: false
        in: path
        name: dppId
        required: true
        schema:
          minLength: 1
          type: string
        style: simple
      - description: |
          DPP serialization representation for the write payload. Compressed is the default and only supported write representation; full returns 501.
        explode: true
        in: query
        name: representation
        required: false
        schema:
          $ref: "#/components/schemas/Representation"
        style: form
      requestBody:
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/DigitalProductPassportPatch"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalProductPassport"
          description: Updated DPP
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Invalid request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Authentication is required.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The authenticated subject is not allowed to perform the operation.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Resource not found.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The request conflicts with the current resource state or regulatory
            restrictions.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Internal server error.
      summary: Update DPP by DPP ID
      tags:
      - DPP Life Cycle
  /v1/dpps:
    post:
      description: |
        Creates a DPP from the submitted compressed DPP document. Creation is atomic. Full representation writes are not supported.
      operationId: createDPP
      parameters:
      - description: |
          DPP serialization representation for the write payload. Compressed is the default and only supported write representation; full returns 501.
        explode: true
        in: query
        name: representation
        required: false
        schema:
          $ref: "#/components/schemas/Representation"
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DigitalProductPassport"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDPPResponse"
          description: DPP created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Invalid request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Authentication is required.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The authenticated subject is not allowed to perform the operation.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The request conflicts with the current resource state or regulatory
            restrictions.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Internal server error.
      summary: Create DPP
      tags:
      - DPP Life Cycle
  /v1/dppsByProductId/{productId}:
    get:
      description: |
        Resolves the product identifier and returns the corresponding DPP document.
      operationId: readDPPByProductId
      parameters:
      - description: Percent-encoded product identifier as specified by EN 18219.
        explode: false
        in: path
        name: productId
        required: true
        schema:
          minLength: 1
          type: string
        style: simple
      - description: |
          DPP serialization representation. Compressed is mandatory and the default. Full is optional and corresponds to the expanded representation.
        explode: true
        in: query
        name: representation
        required: false
        schema:
          $ref: "#/components/schemas/Representation"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalProductPassport"
          description: DPP document
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Invalid request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Authentication is required.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The authenticated subject is not allowed to perform the operation.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Resource not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Internal server error.
      summary: Read DPP by product ID
      tags:
      - DPP Life Cycle
  /v1/dppsByIdAndDate/{dppId}:
    get:
      description: |
        Retrieves the DPP version that was current at the provided ISO 8601 UTC timestamp.
      operationId: readDPPVersionByIdAndDate
      parameters:
      - description: Percent-encoded Digital Product Passport identifier.
        explode: false
        in: path
        name: dppId
        required: true
        schema:
          minLength: 1
          type: string
        style: simple
      - description: ISO 8601 UTC timestamp.
        explode: true
        in: query
        name: date
        required: true
        schema:
          format: date-time
          type: string
        style: form
      - description: |
          DPP serialization representation. Compressed is mandatory and the default. Full is optional and corresponds to the expanded representation.
        explode: true
        in: query
        name: representation
        required: false
        schema:
          $ref: "#/components/schemas/Representation"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalProductPassport"
          description: Historical DPP document
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Invalid request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Authentication is required.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The authenticated subject is not allowed to perform the operation.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Resource not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Internal server error.
      summary: Read historical DPP version by ID and date
      tags:
      - DPP Life Cycle
  /v1/dppsByProductIds:
    post:
      description: |
        Resolves a set of product identifiers to DPP identifiers. Pagination via limit and cursor should be supported.
      operationId: readDPPIdsByProductIds
      parameters:
      - description: Maximum number of returned DPP identifiers.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          minimum: 1
          type: integer
        style: form
      - description: Opaque pagination cursor.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReadDPPIdsByProductIdsRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DPPIdSearchResult"
          description: Matching DPP IDs
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Invalid request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Authentication is required.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The authenticated subject is not allowed to perform the operation.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Internal server error.
      summary: Resolve product IDs to DPP IDs
      tags:
      - DPP Life Cycle
  /v1/dpps/{dppId}/elements/{elementIdPath}:
    get:
      description: |
        Retrieves one DPP data element. The elementIdPath is an RFC 9535 Normalized Path selecting a single element inside the compressed DPP document and must be percent-encoded once as one path segment.
      operationId: readDataElement
      parameters:
      - description: Percent-encoded Digital Product Passport identifier.
        explode: false
        in: path
        name: dppId
        required: true
        schema:
          minLength: 1
          type: string
        style: simple
      - description: RFC 9535 Normalized Path selecting one DPP data element. Clients must percent-encode it once when placing it in a path segment.
        example: "$['https://admin-shell.io/idta/CarbonFootprint/CarbonFootprint/1/0']['ProductCarbonFootprints']"
        explode: false
        in: path
        name: elementIdPath
        required: true
        schema:
          minLength: 1
          type: string
        style: simple
      - description: |
          DPP serialization representation. Compressed is mandatory and the default. Full is optional and corresponds to the expanded representation.
        explode: true
        in: query
        name: representation
        required: false
        schema:
          $ref: "#/components/schemas/Representation"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/CompressedDataElementValue"
                - $ref: "#/components/schemas/DataElement"
          description: Data element
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Invalid request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Authentication is required.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The authenticated subject is not allowed to perform the operation.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Resource not found.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Internal server error.
      summary: Read single DPP data element
      tags:
      - DPP Fine Granular
    patch:
      description: |
        Updates one DPP data element using its compressed JSON value and updates lastUpdate. The elementIdPath is an RFC 9535 Normalized Path selecting a single element inside the compressed DPP document and must be percent-encoded once as one path segment. Full representation writes are not supported.
      operationId: updateDataElement
      parameters:
      - description: Percent-encoded Digital Product Passport identifier.
        explode: false
        in: path
        name: dppId
        required: true
        schema:
          minLength: 1
          type: string
        style: simple
      - description: RFC 9535 Normalized Path selecting one DPP data element. Clients must percent-encode it once when placing it in a path segment.
        example: "$['https://admin-shell.io/idta/CarbonFootprint/CarbonFootprint/1/0']['ProductCarbonFootprints']"
        explode: false
        in: path
        name: elementIdPath
        required: true
        schema:
          minLength: 1
          type: string
        style: simple
      - description: |
          DPP serialization representation for the write payload. Compressed is the default and only supported write representation; full returns 501.
        explode: true
        in: query
        name: representation
        required: false
        schema:
          $ref: "#/components/schemas/Representation"
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompressedDataElementValue"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompressedDataElementValue"
          description: Updated data element
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Invalid request.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Authentication is required.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The authenticated subject is not allowed to perform the operation.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Resource not found.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: The request conflicts with the current resource state or regulatory
            restrictions.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
          description: Internal server error.
      summary: Update single DPP data element
      tags:
      - DPP Fine Granular
components:
  parameters:
    DppId:
      description: Percent-encoded Digital Product Passport identifier.
      explode: false
      in: path
      name: dppId
      required: true
      schema:
        minLength: 1
        type: string
      style: simple
    ProductId:
      description: Percent-encoded product identifier as specified by EN 18219.
      explode: false
      in: path
      name: productId
      required: true
      schema:
        minLength: 1
        type: string
      style: simple
    ElementIdPath:
      description: RFC 9535 Normalized Path selecting one DPP data element. Clients must percent-encode it once when placing it in a path segment.
      example: "$['https://admin-shell.io/idta/CarbonFootprint/CarbonFootprint/1/0']['ProductCarbonFootprints']"
      explode: false
      in: path
      name: elementIdPath
      required: true
      schema:
        minLength: 1
        type: string
      style: simple
    Representation:
      description: |
        DPP serialization representation. Compressed is mandatory and the default. Full is optional and corresponds to the expanded representation.
      explode: true
      in: query
      name: representation
      required: false
      schema:
        $ref: "#/components/schemas/Representation"
      style: form
    Date:
      description: ISO 8601 UTC timestamp.
      explode: true
      in: query
      name: date
      required: true
      schema:
        format: date-time
        type: string
      style: form
    Limit:
      description: Maximum number of returned DPP identifiers.
      explode: true
      in: query
      name: limit
      required: false
      schema:
        default: 100
        minimum: 1
        type: integer
      style: form
    Cursor:
      description: Opaque pagination cursor.
      explode: true
      in: query
      name: cursor
      required: false
      schema:
        type: string
      style: form
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Result"
      description: Invalid request.
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Result"
      description: Authentication is required.
    Forbidden:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Result"
      description: The authenticated subject is not allowed to perform the operation.
    NotFound:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Result"
      description: Resource not found.
    Conflict:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Result"
      description: The request conflicts with the current resource state or regulatory
        restrictions.
    InternalServerError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Result"
      description: Internal server error.
  schemas:
    Representation:
      default: compressed
      enum:
      - compressed
      - full
      type: string
    DigitalProductPassport:
      additionalProperties: true
      description: |
        A single DPP JSON document composed from DPP header fields and content sections. Compressed write payloads use top-level content section properties whose names match contentSpecificationIds entries. Full read payloads use the expanded read-only elements array defined by the DPP API annex.
      example:
        digitalProductPassportId: https://www.example.org/dpp/1234545
        uniqueProductIdentifier: https://www.example.org/1234545
        granularity: Item
        dppSchemaVersion: ENXXX:v1.0
        dppStatus: Active
        lastUpdate: 2025-08-22T03:12:00Z
        economicOperatorId: gxx:ppp456789
        facilityId: gxx:xxx987654
        contentSpecificationIds:
        - https://admin-shell-io/idta/digitalproductpassport/Nameplate/1
        https://admin-shell-io/idta/digitalproductpassport/Nameplate/1:
          ManufacturerName: VoltFabrik GmbH
      properties:
        digitalProductPassportId:
          description: Digital Product Passport identifier.
          example: https://www.example.org/dpp/1234545
          minLength: 1
          type: string
        uniqueProductIdentifier:
          description: Unique product identifier associated with the DPP.
          example: https://www.example.org/1234545
          minLength: 1
          type: string
        granularity:
          $ref: "#/components/schemas/Granularity"
        dppSchemaVersion:
          example: ENXXX:v1.0
          minLength: 1
          type: string
        dppStatus:
          example: Active
          minLength: 1
          type: string
        lastUpdate:
          description: Timestamp of the latest DPP update.
          example: 2025-08-22T03:12:00Z
          format: date-time
          type: string
        economicOperatorId:
          description: Economic operator identifier as specified by EN 18219.
          example: gxx:ppp456789
          minLength: 1
          type: string
        facilityId:
          description: Facility identifier as specified by EN 18219.
          example: gxx:xxx987654
          minLength: 1
          type: string
        contentSpecificationIds:
          description: |
            Optional identifiers of content specifications contributing DPP content sections. In compressed representation, a top-level content section named exactly like one of these identifiers contains data for that content specification. Expanded DataElementCollection write payloads are rejected.
          example:
          - https://admin-shell-io/idta/digitalproductpassport/Nameplate/1
          items:
            minLength: 1
            type: string
          type: array
        elements:
          description: Expanded read-only DPP DataElements returned when representation=full.
          items:
            $ref: "#/components/schemas/DataElement"
          type: array
      required:
      - digitalProductPassportId
      - dppSchemaVersion
      - dppStatus
      - economicOperatorId
      - granularity
      - lastUpdate
      - uniqueProductIdentifier
      type: object
    DigitalProductPassportPatch:
      additionalProperties: true
      description: JSON Merge Patch document for a DigitalProductPassport.
      properties:
        digitalProductPassportId:
          nullable: true
          type: string
        uniqueProductIdentifier:
          nullable: true
          type: string
        granularity:
          enum:
          - Item
          - Model
          - Batch
          nullable: true
          type: string
        dppSchemaVersion:
          nullable: true
          type: string
        dppStatus:
          nullable: true
          type: string
        lastUpdate:
          format: date-time
          nullable: true
          type: string
        economicOperatorId:
          nullable: true
          type: string
        facilityId:
          nullable: true
          type: string
        contentSpecificationIds:
          items:
            type: string
          nullable: true
          type: array
      type: object
    Granularity:
      description: EN 18223 DPP granularity value.
      enum:
      - Item
      - Model
      - Batch
      type: string
    DataElement:
      discriminator:
        mapping:
          SingleValuedDataElement: "#/components/schemas/SingleValuedDataElement"
          MultiValuedDataElement: "#/components/schemas/MultiValuedDataElement"
          MultiLanguageDataElement: "#/components/schemas/MultiLanguageDataElement"
          DataElementCollection: "#/components/schemas/DataElementCollection"
          RelatedResource: "#/components/schemas/RelatedResource"
        propertyName: objectType
      oneOf:
      - $ref: "#/components/schemas/SingleValuedDataElement"
      - $ref: "#/components/schemas/MultiValuedDataElement"
      - $ref: "#/components/schemas/MultiLanguageDataElement"
      - $ref: "#/components/schemas/DataElementCollection"
      - $ref: "#/components/schemas/RelatedResource"
    CompressedDataElementValue:
      description: Raw compressed DPP element value. The value may be a scalar, object, array, or null.
      nullable: true
      oneOf:
      - type: string
      - type: number
      - type: integer
      - type: boolean
      - additionalProperties: true
        type: object
      - items: {}
        type: array
    SingleValuedDataElement:
      additionalProperties: false
      example:
        elementId: elementId
        objectType: SingleValuedDataElement
        dictionaryReference: dictionaryReference
        valueDataType: xsd:string
        value: ""
      properties:
        elementId:
          description: DPP element identifier.
          minLength: 1
          type: string
        objectType:
          enum:
          - SingleValuedDataElement
          type: string
        dictionaryReference:
          description: DPP dictionary reference.
          type: string
        valueDataType:
          $ref: "#/components/schemas/XsdValueDataType"
        value:
          description: Scalar value serialized according to valueDataType.
      required:
      - elementId
      - objectType
      - value
      - valueDataType
      type: object
    MultiValuedDataElement:
      additionalProperties: false
      properties:
        elementId:
          description: DPP element identifier.
          minLength: 1
          type: string
        objectType:
          enum:
          - MultiValuedDataElement
          type: string
        dictionaryReference:
          description: DPP dictionary reference.
          type: string
        valueDataType:
          description: Scalar item datatype. Omitted for multi-valued elements whose children are collections, multilingual data, or related resources.
