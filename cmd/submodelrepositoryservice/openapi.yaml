openapi: 3.0.3
info:
  title: DotAAS Part 2 | HTTP/REST | Submodel Repository Service Specification
  description: >-
    The entire Submodel Repository Service Specification as part of the [Specification of the Asset Administration Shell: Part 2](https://industrialdigitaltwin.org/en/content-hub/aasspecifications).

    Copyright: Industrial Digital Twin Association (IDTA) 2025
  contact:
    name: Industrial Digital Twin Association (IDTA)
    email: info@idtwin.org
  license:
    name: CC BY 4.0
    url: https://creativecommons.org/licenses/by/4.0/
  version: V3.2.0
  x-profile-identifier: https://admin-shell.io/aas/API/3/2/SubmodelRepositoryServiceSpecification/SSP-001
  x-profile-identifiers:
    - https://admin-shell.io/aas/API/3/2/SubmodelRepositoryServiceSpecification/SSP-001
    - https://admin-shell.io/aas/API/3/2/SubmodelRepositoryServiceSpecification/SSP-003
    - https://admin-shell.io/aas/API/3/2/SubmodelRepositoryServiceSpecification/SSP-004
    - https://admin-shell.io/aas/API/3/2/SubmodelRepositoryServiceSpecification/SSP-005
    - https://admin-shell.io/aas/API/3/2/SubmodelRepositoryServiceSpecification/SSP-006
    - https://admin-shell.io/aas/API/3/2/SubmodelRepositoryServiceSpecification/SSP-007
servers:
- url: 'https://admin-shell.io/api/v3/'
- url: 'https://example.com/'
paths:
  /submodels:
    get:
      tags:
        - Submodel Repository API
      summary: Returns all Submodels
      operationId: GetAllSubmodels
      x-semanticIds:
        - https://admin-shell.io/aas/API/GetAllSubmodels/3/2
        - https://admin-shell.io/aas/API/GetAllSubmodelsBySemanticId/3/2
        - https://admin-shell.io/aas/API/GetAllSubmodelsByIdShort/3/2
      parameters:
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/SemanticId'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/IdShort'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/CreatedFrom'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/UpdatedFrom'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Limit'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Cursor'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Level'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Extent'
      responses:
        '200':
          description: Requested Submodels
          content:
            application/json:
              schema:
                $ref: '../Part2-API-Schemas/openapi.yaml#/components/schemas/GetSubmodelsResult'
        '400':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/bad-request'
        '401':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/unauthorized'
        '403':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/forbidden'
        '500':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/internal-server-error'
        default:
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/default'
    post:
      tags:
        - Submodel Repository API
      summary: Creates a new Submodel
      operationId: PostSubmodel
      x-semanticIds:
        - https://admin-shell.io/aas/API/PostSubmodel/3/2
      requestBody:
        description: Submodel object
        content:
          application/json:
            schema:
              $ref: '../Part1-MetaModel-Schemas/openapi.yaml#/components/schemas/Submodel'
        required: true
      responses:
        '201':
          description: Submodel created successfully
          headers:
            Location:
              description: URL of the newly created resource
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '../Part1-MetaModel-Schemas/openapi.yaml#/components/schemas/Submodel'
        '400':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/bad-request'
        '401':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/unauthorized'
        '403':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/forbidden'
        '409':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/conflict'
        '500':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/internal-server-error'
        default:
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/default'
  /submodels/$metadata:
    get:
      tags:
        - Submodel Repository API
      summary: Returns the metadata attributes of all Submodels
      operationId: GetAllSubmodels-Metadata
      x-semanticIds:
        - https://admin-shell.io/aas/API/GetAllSubmodels/3/2
        - https://admin-shell.io/aas/API/GetAllSubmodelsBySemanticId/3/2
        - https://admin-shell.io/aas/API/GetAllSubmodelsByIdShort/3/2
      parameters:
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/SemanticId'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/IdShort'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Limit'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Cursor'
      responses:
        '200':
          description: Requested Submodels
          content:
            application/json:
              schema:
                $ref: '../Part2-API-Schemas/openapi.yaml#/components/schemas/GetSubmodelsMetadataResult'
        '400':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/bad-request'
        '401':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/unauthorized'
        '403':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/forbidden'
        '500':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/internal-server-error'
        default:
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/default'
  /submodels/$value:
    get:
      tags:
        - Submodel Repository API
      summary: Returns all Submodels in their ValueOnly representation
      operationId: GetAllSubmodels-ValueOnly
      x-semanticIds:
        - https://admin-shell.io/aas/API/GetAllSubmodels/3/2
        - https://admin-shell.io/aas/API/GetAllSubmodelsBySemanticId/3/2
        - https://admin-shell.io/aas/API/GetAllSubmodelsByIdShort/3/2
      parameters:
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/SemanticId'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/IdShort'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Limit'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Cursor'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Level'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Extent'
      responses:
        '200':
          description: Requested Submodels
          content:
            application/json:
              schema:
                $ref: '../Part2-API-Schemas/openapi.yaml#/components/schemas/GetSubmodelsValueResult'
        '400':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/bad-request'
        '401':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/unauthorized'
        '403':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/forbidden'
        '404':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/not-found'
        '500':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/internal-server-error'
        default:
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/default'
  /submodels/$reference:
    get:
      tags:
        - Submodel Repository API
      summary: Returns the References for all Submodels
      operationId: GetAllSubmodels-Reference
      x-semanticIds:
        - https://admin-shell.io/aas/API/GetAllSubmodels/3/2
        - https://admin-shell.io/aas/API/GetAllSubmodelsBySemanticId/3/2
        - https://admin-shell.io/aas/API/GetAllSubmodelsByIdShort/3/2
      parameters:
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/SemanticId'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/IdShort'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Limit'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Cursor'
        - name: level
          in: query
          description: Determines the structural depth of the respective resource content
          required: false
          deprecated: true
          schema:
            type: string
            default: core
            enum:
              # - deep
              - core # only 'core' is allowed for Content=Reference
      responses:
        '200':
          description: References of the requested Submodels
          content:
            application/json:
              schema:
                $ref: '../Part2-API-Schemas/openapi.yaml#/components/schemas/GetReferencesResult'
        '400':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/bad-request'
        '401':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/unauthorized'
        '403':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/forbidden'
        '500':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/internal-server-error'
        default:
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/default'
  /submodels/$path:
    get:
      tags:
        - Submodel Repository API
      summary: Returns all Submodels in the Path notation
      operationId: GetAllSubmodels-Path
      x-semanticIds:
        - https://admin-shell.io/aas/API/GetAllSubmodels/3/2
        - https://admin-shell.io/aas/API/GetAllSubmodelsBySemanticId/3/2
        - https://admin-shell.io/aas/API/GetAllSubmodelsByIdShort/3/2
      parameters:
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/SemanticId'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/IdShort'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Limit'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Cursor'
        - $ref: '../Part2-API-Schemas/openapi.yaml#/components/parameters/Level'
      responses:
        '200':
          description: Requested Submodels
          content:
            application/json:
              schema:
                $ref: '../Part2-API-Schemas/openapi.yaml#/components/schemas/GetPathItemsResult'
        '400':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/bad-request'
        '401':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/unauthorized'
        '403':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/forbidden'
        '500':
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/internal-server-error'
        default:
          $ref: '../Part2-API-Schemas/openapi.yaml#/components/responses/default'
