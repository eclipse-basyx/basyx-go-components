services:
  db_it:
    image: postgres:18
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: basyxTestDB
    command: ["postgres", "-c", "listen_addresses=*"]
    ports:
      - "127.0.0.1:${BASYX_IT_DB_PORT:-6432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d basyxTestDB"]
      interval: 10s
      timeout: 5s
      retries: 5
  submodel_repository_it:
    build:
      context: ../../../..
      dockerfile: ./cmd/submodelrepositoryservice/Dockerfile
      
    environment:
      - SERVER_PORT=5004
      - POSTGRES_HOST=db_it
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=500
      - POSTGRES_MAXIDLECONNECTIONS=500
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
      - ABAC_ENABLED=false
      - BASYX_HISTORY_MODE=api
      - BASYX_HISTORY_FULL_SNAPSHOT_INTERVAL=3
      - JWS_PRIVATEKEYPATH=/app/rsa-key.pem
      - SERVER_STRICTVERIFICATION=off
      - SMREPO_DELEGATION_TRUSTED_HOSTS=localhost:*,127.0.0.1:*,[::1]:*,host.docker.internal:*,172.17.0.1:*,192.168.65.2:*,192.168.65.254:*
    volumes:
      - ./rsa-key.pem:/app/rsa-key.pem:ro
    ports:
      - "127.0.0.1:${BASYX_IT_API_PORT:-6004}:5004"
    extra_hosts:
      - "localhost:host-gateway"
      - "host.docker.internal:host-gateway"
    depends_on:
      basyx_configuration:
        condition: service_completed_successfully
      db_it:
        condition: service_healthy

  submodel_repository_it_sync_on:
    build:
      context: ../../../..
      dockerfile: ./cmd/submodelrepositoryservice/Dockerfile
    environment:
      - SERVER_PORT=5004
      - POSTGRES_HOST=db_it
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=500
      - POSTGRES_MAXIDLECONNECTIONS=500
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
      - ABAC_ENABLED=false
      - JWS_PRIVATEKEYPATH=/app/rsa-key.pem
      - SERVER_STRICTVERIFICATION=off
      - GENERAL_SUBMODELREGISTRYINTEGRATION=true
      - GENERAL_EXTERNALURL=http://127.0.0.1:${BASYX_IT_SYNC_API_PORT:-6008}
    volumes:
      - ./rsa-key.pem:/app/rsa-key.pem:ro
    ports:
      - "127.0.0.1:${BASYX_IT_SYNC_API_PORT:-6008}:5004"
    command: ["/app/submodelrepositoryservice", "-config", "/config/config.yaml"]
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      basyx_configuration:
        condition: service_completed_successfully
      db_it:
        condition: service_healthy

  aas_repository_it_companion:
    build:
      context: ../../../..
      dockerfile: ./cmd/aasrepositoryservice/Dockerfile
    environment:
      - SERVER_PORT=5004
      - POSTGRES_HOST=db_it
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=500
      - POSTGRES_MAXIDLECONNECTIONS=500
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
      - SERVER_STRICTVERIFICATION=off
      - GENERAL_AASREGISTRYINTEGRATION=true
      - GENERAL_EXTERNALURL=http://127.0.0.1:${BASYX_IT_AAS_API_PORT:-6006}
    ports:
      - "127.0.0.1:${BASYX_IT_AAS_API_PORT:-6006}:5004"
    command: ["/app/aasrepositoryservice", "-config", "/config/config.yaml"]
    depends_on:
      basyx_configuration:
        condition: service_completed_successfully
      db_it:
        condition: service_healthy

  submodel_repository_it_invalid_toggle:
    build:
      context: ../../../..
      dockerfile: ./cmd/submodelrepositoryservice/Dockerfile
    environment:
      - SERVER_PORT=5004
      - POSTGRES_HOST=db_it
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=500
      - POSTGRES_MAXIDLECONNECTIONS=500
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
      - ABAC_ENABLED=false
      - JWS_PRIVATEKEYPATH=/app/rsa-key.pem
      - SERVER_STRICTVERIFICATION=off
      - GENERAL_AASREGISTRYINTEGRATION=true
    volumes:
      - ./rsa-key.pem:/app/rsa-key.pem:ro
    ports:
      - "127.0.0.1:${BASYX_IT_INVALID_API_PORT:-6007}:5004"
    command: ["/app/submodelrepositoryservice", "-config", "/config/config.yaml"]
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      basyx_configuration:
        condition: service_completed_successfully
      db_it:
        condition: service_healthy

  basyx_configuration:
    build:
      context: ../../../..
      dockerfile: ./cmd/basyxconfigurationservice/Dockerfile
    environment:
      - POSTGRES_HOST=db_it
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=500
      - POSTGRES_MAXIDLECONNECTIONS=500
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
    depends_on:
      db_it:
        condition: service_healthy
