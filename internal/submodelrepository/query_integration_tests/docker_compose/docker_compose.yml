services:
  db:
    image: postgres:18
    container_name: smrepo_security_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: basyxTestDB
    command: ["postgres", "-c", "listen_addresses=*"]
    ports:
      - "6432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d basyxTestDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  submodel-repository-security:
    container_name: submodel-repository-security
    build:
      context: ../../../..
      dockerfile: ./cmd/submodelrepositoryservice/Dockerfile
    environment:
      - SERVER_PORT=5004
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=500
      - POSTGRES_MAXIDLECONNECTIONS=500
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
      - SERVER_STRICTVERIFICATION=off
      - ABAC_ENABLED=false
    ports:
      - "6004:5004"
    depends_on:
      basyx_configuration:
        condition: service_completed_successfully

  basyx_configuration:
    container_name: basyx_configuration
    build:
      context: ../../../..
      dockerfile: ./cmd/basyxconfigurationservice/Dockerfile
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=500
      - POSTGRES_MAXIDLECONNECTIONS=500
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
    depends_on:
      db:
        condition: service_healthy
