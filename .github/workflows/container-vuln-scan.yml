name: Container Vulnerability Scan

on:
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/container-vuln-scan.yml'
      - '.github/workflows/docker-release.yml'
      - '.github/workflows/docker-snapshot.yml'
  push:
    branches:
      - main
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/container-vuln-scan.yml'
      - '.github/workflows/docker-release.yml'
      - '.github/workflows/docker-snapshot.yml'
  schedule:
    - cron: '0 4 * * 1'

concurrency:
  group: vuln-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  trivy-report:
    name: Trivy report (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a5
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360
        with:
          sarif_file: trivy-results.sarif

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          retention-days: 30
