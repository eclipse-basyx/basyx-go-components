name: Go Application Tests

on:
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-tests.yml'
      - '**.sql'
      - 'internal/aasregistry/security_oidc_tests/**'
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-tests.yml'
      - '**.sql'
      - 'internal/aasregistry/security_oidc_tests/**'

permissions:
  contents: read

jobs:
  discovery-service-security-tests:
    name: Discovery Service Security Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Run discovery service security tests
        run: |
          cd internal/discoveryservice/security_tests
          go test -v

  submodel-repository-integration-tests:
    name: Submodel Repository Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
