name: Vulnerability Scan

on:
  release:
    types: [published]
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'database/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/vuln-scan.yml'
      - '.github/workflows/docker-release.yml'
      - '.github/workflows/docker-snapshot.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 4 */2 * *'

concurrency:
  group: vuln-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  trivy-repo-fs-report:
    name: Trivy repository filesystem scan (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run Trivy repository filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-repo-results.sarif
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload SARIF report
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          sarif_file: trivy-repo-results.sarif
          category: trivy-repo-fs

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-repo-sarif
          path: trivy-repo-results.sarif
          retention-days: 30

  trivy-image-report:
    name: Trivy image scan (${{ matrix.service.name }}) (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: aasenvironmentservice
          - name: aasregistryservice
          - name: discoveryservice
          - name: digitaltwinregistryservice
          - name: companylookupservice
          - name: submodelrepositoryservice
          - name: submodelregistryservice
          - name: conceptdescriptionrepositoryservice
          - name: aasrepositoryservice
          - name: aasxfileserverservice
          - name: basyxconfigurationservice
          - name: dppapiservice

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Build local image for scanning
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./cmd/${{ matrix.service.name }}/Dockerfile
          pull: true
          push: false
          load: true
          tags: local/${{ matrix.service.name }}:scan
          platforms: linux/amd64

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: local/${{ matrix.service.name }}:scan
          format: sarif
          output: trivy-image-${{ matrix.service.name }}.sarif
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload SARIF report
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          sarif_file: trivy-image-${{ matrix.service.name }}.sarif
          category: trivy-image-${{ matrix.service.name }}

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-image-sarif-${{ matrix.service.name }}
          path: trivy-image-${{ matrix.service.name }}.sarif
          retention-days: 30
