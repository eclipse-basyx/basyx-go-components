name: Examples Smoke Tests

on:
  pull_request:
    paths:
      - 'examples/**'
      - 'cmd/**'
      - 'internal/**'
      - 'basyxschema.sql'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/examples-smoke.yml'
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'cmd/**'
      - 'internal/**'
      - 'basyxschema.sql'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/examples-smoke.yml'
  workflow_dispatch:

jobs:
  examples-smoke:
    name: Start example stacks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Ensure Docker Compose plugin is available
        run: docker compose version

      - name: Build local Go service images used by examples
        run: |
          set -euo pipefail

          docker build -t eclipsebasyx/aasregistry-go:SNAPSHOT -f ./cmd/aasregistryservice/Dockerfile .
          docker build -t eclipsebasyx/submodelregistry-go:SNAPSHOT -f ./cmd/submodelregistryservice/Dockerfile .
          docker build -t eclipsebasyx/aasdiscovery-go:SNAPSHOT -f ./cmd/discoveryservice/Dockerfile .
          docker build -t eclipsebasyx/aasrepository-go:SNAPSHOT -f ./cmd/aasrepositoryservice/Dockerfile .
          docker build -t eclipsebasyx/submodelrepository-go:SNAPSHOT -f ./cmd/submodelrepositoryservice/Dockerfile .
          docker build -t eclipsebasyx/conceptdescriptionrepository-go:SNAPSHOT -f ./cmd/conceptdescriptionrepositoryservice/Dockerfile .
          docker build -t eclipsebasyx/digitaltwinregistry-go:SNAPSHOT -f ./cmd/digitaltwinregistryservice/Dockerfile .
          docker build -t eclipsebasyx/companylookup-go:SNAPSHOT -f ./cmd/companylookupservice/Dockerfile .

      - name: Start all available examples and verify startup state
        run: |
          set -euo pipefail

          EXAMPLES=(
            "examples/BaSyxSubmodelRepositoryExample/docker-compose.yml"
            "examples/BaSyxMinimalExample/docker-compose.yml"
            "examples/BaSyxCompanyLookup/docker-compose.yml"
            "examples/BaSyxDelegatedOperationsExample/docker-compose.yml"
            "examples/BaSyxDigitalTwinRegistryExample/docker-compose.yml"
            "examples/BaSyxSecuredExample/docker-compose.yml"
          )

          check_compose_stack() {
            local compose_file="$1"
            local timeout_seconds=360
            local interval_seconds=5
            local elapsed=0

            while [ "$elapsed" -lt "$timeout_seconds" ]; do
              mapfile -t ids < <(docker compose -f "$compose_file" ps -q)

              if [ "${#ids[@]}" -eq 0 ]; then
                echo "No containers started yet for $compose_file"
                sleep "$interval_seconds"
                elapsed=$((elapsed + interval_seconds))
                continue
              fi

              local running_count=0
              local all_ready=true

              for id in "${ids[@]}"; do
                local name status exit_code health
                name=$(docker inspect -f '{{.Name}}' "$id" | sed 's#^/##')
                status=$(docker inspect -f '{{.State.Status}}' "$id")
                exit_code=$(docker inspect -f '{{.State.ExitCode}}' "$id")
                health=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$id")

                if [ "$status" = "dead" ] || [ "$status" = "removing" ]; then
                  echo "Container $name in invalid state: $status"
                  return 1
                fi

                if [ "$status" = "exited" ] && [ "$exit_code" -ne 0 ]; then
                  echo "Container $name exited with non-zero code: $exit_code"
                  return 1
                fi

                if [ "$health" = "unhealthy" ]; then
                  echo "Container $name became unhealthy"
                  return 1
                fi

                if [ "$status" = "running" ]; then
                  running_count=$((running_count + 1))
                  if [ "$health" = "starting" ]; then
                    all_ready=false
                  fi
                elif [ "$status" = "created" ] || [ "$status" = "restarting" ]; then
                  all_ready=false
                elif [ "$status" = "exited" ]; then
                  :
                else
                  all_ready=false
                fi
              done

              if [ "$running_count" -gt 0 ] && [ "$all_ready" = true ]; then
                return 0
              fi

              sleep "$interval_seconds"
              elapsed=$((elapsed + interval_seconds))
            done

            echo "Timeout while waiting for stack readiness: $compose_file"
            return 1
          }

          cleanup_stack() {
            local compose_file="$1"
            docker compose -f "$compose_file" down -v --remove-orphans || true
          }

          for compose_file in "${EXAMPLES[@]}"; do
            echo "===> Starting $compose_file"

            if ! docker compose -f "$compose_file" up -d --build --remove-orphans; then
              echo "Failed to start compose stack: $compose_file"
              docker compose -f "$compose_file" ps || true
              docker compose -f "$compose_file" logs --no-color || true
              cleanup_stack "$compose_file"
              exit 1
            fi

            if ! check_compose_stack "$compose_file"; then
              echo "Stack readiness check failed: $compose_file"
              docker compose -f "$compose_file" ps || true
              docker compose -f "$compose_file" logs --no-color || true
              cleanup_stack "$compose_file"
              exit 1
            fi

            sleep 10

            if ! check_compose_stack "$compose_file"; then
              echo "Stack became unstable during smoke hold: $compose_file"
              docker compose -f "$compose_file" ps || true
              docker compose -f "$compose_file" logs --no-color || true
              cleanup_stack "$compose_file"
              exit 1
            fi

            docker compose -f "$compose_file" ps
            cleanup_stack "$compose_file"
          done
